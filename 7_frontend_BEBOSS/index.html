<!DOCTYPE html>
<html>
<head>
    <title>TrackCoords - Тест</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        #trackBox {
            width: 500px;
            height: 300px;
            border: 3px solid red;
            background-color: #f0f0f0;
            margin: 20px 0;
            position: relative;
        }
        
        #info {
            margin-top: 20px;
            padding: 10px;
            background-color: #e0e0e0;
        }
        
        #coords {
            font-weight: bold;
            color: blue;
        }
        
        button {
            padding: 10px 20px;
            margin-right: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        
        #status {
            margin-top: 10px;
            color: green;
        }
        
        #dataDisplay {
            background: white;
            border: 1px solid #ccc;
            padding: 10px;
            min-height: 100px;
            max-height: 300px;
            overflow: auto;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div id="trackBox">
        <p style="padding: 20px;">Двигайте мышью в этой красной области</p>
        <p style="padding: 20px;">Координаты: <span id="coords">0, 0</span></p>
    </div>
    
    <div>
        <button onclick="startPlugin()">Запустить</button>
        <button onclick="stopPlugin()">Остановить</button>
        <button onclick="showData()">Показать данные</button>
        <button onclick="clearData()">Очистить данные</button>
    </div>
    
    <div id="status">Статус: Не запущен</div>
    
    <div id="info">
        <h3>Текущие данные:</h3>
        <div id="dataDisplay">Нет данных</div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Наш плагин -->
    <script src="js/jquery.trackcoords.js"></script>
    
    <script>
        // Переменные
        var pluginActive = false;
        var updateInterval;
        
        // Показываем координаты
        $('#trackBox').mousemove(function(e) {
            var offset = $(this).offset();
            var x = e.pageX - offset.left;
            var y = e.pageY - offset.top;
            
            x = Math.round(x);
            y = Math.round(y);
            
            $('#coords').text(x + ', ' + y);
        });
        
        // Запуск плагина
        function startPlugin() {
            if (pluginActive) {
                stopPlugin();
            }
            
            $('#trackBox').trackCoords({
                checkInterval: 30,
                sendInterval: 3000,
                url: '/save.php'
            });
            
            pluginActive = true;
            $('#status').text('Статус: ЗАПУЩЕН').css('color', 'green');
            
            // Обновляем отображение данных
            updateInterval = setInterval(showData, 1000);
            
            console.log('Плагин запущен');
        }
        
        // Остановка плагина
        function stopPlugin() {
            var plugin = $('#trackBox').data('trackCoords');
            if (plugin) {
                plugin.stop();
            }
            
            pluginActive = false;
            $('#status').text('Статус: Остановлен').css('color', 'red');
            
            if (updateInterval) {
                clearInterval(updateInterval);
            }
            
            console.log('Плагин остановлен');
        }
        
        // Показать данные
        function showData() {
            var plugin = $('#trackBox').data('trackCoords');
            if (plugin && plugin.mouseData) {
                if (plugin.mouseData.length > 0) {
                    $('#dataDisplay').text(JSON.stringify(plugin.mouseData, null, 2));
                } else {
                    $('#dataDisplay').text('Нет данных');
                }
            }
        }
        
        // Очистить данные
        function clearData() {
            var plugin = $('#trackBox').data('trackCoords');
            if (plugin) {
                plugin.mouseData = [];
                $('#dataDisplay').text('Нет данных');
                console.log('Данные очищены');
            }
        }
        
        // Автозапуск при загрузке
        $(document).ready(function() {
            // Запускаем через 1 секунду
            setTimeout(startPlugin, 1000);
        });
    </script>
</body>
</html>
